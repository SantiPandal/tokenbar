name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Swift executable
        run: swift build -c release

      - name: Build app bundle
        run: scripts/build_app.sh

      - name: Check npm package contents
        run: npm pack --dry-run
